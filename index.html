<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragment | Connect Wallet</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        #connect-button { margin-top: 20px; }
        .btn-confirm { background: #0088cc; border: none; padding: 12px 25px; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://fragment.com/img/fragment_logo.svg" width="150" alt="Fragment">
        <h3>تأكيد ملكية اليوزر</h3>
        <p>قم بربط محفظتك لتأكيد يوزر <span id="target-user">@...</span></p>
        <div id="connect-button"></div>
        <button id="confirm-btn" class="btn-confirm">Confirm & Claim</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
